# GitHub Dependabot config.
#
# Scope: GitHub Actions updates only. The plugin itself has zero
# runtime npm dependencies, so there is nothing else to watch.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

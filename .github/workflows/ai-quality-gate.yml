name: AI Quality Gate

# Static regression guard against every class of bug that the v0.4.3
# review passes actually caught. Encodes each fix as a grep invariant
# so the same bug cannot silently come back in a future AI pass.
#
# Also runs an advisory cross-AI-review probe: if the PR author is one
# AI identity, we look for independent review commentary from the other
# AI identity in the PR comment thread. This is advisory (does not
# block merge); it just surfaces "this PR has no independent AI review
# yet" in the PR check output so the maintainer knows.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  static-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: AI quality gate — regression patterns
        run: bash scripts/ci/check-ai-quality-gate.sh

  cross-ai-review-advisory:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Cross-AI review advisory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SERVER_URL: ${{ github.server_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ci/check-cross-ai-review.mjs
